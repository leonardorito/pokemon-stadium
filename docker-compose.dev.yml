services:
  backend:
    command: npx tsx watch src/index.ts
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_BACKEND_URL: http://localhost:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
